<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Offline — SkyWay</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #F4F7FA; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .wrap { text-align: center; padding: 2rem; max-width: 400px; }
    .icon { font-size: 4rem; margin-bottom: 1rem; }
    h1 { font-family: Georgia, serif; font-size: 1.8rem; color: #0A4F8C; margin-bottom: 0.75rem; }
    p { color: #5A6A78; font-size: 0.95rem; line-height: 1.6; margin-bottom: 1.5rem; }
    a { display: inline-block; background: #0A4F8C; color: #fff; border-radius: 8px; padding: 12px 28px; font-weight: 600; text-decoration: none; }
    .note { color: #8A9BAA; font-size: 0.8rem; margin-top: 1.5rem; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="icon">✈</div>
    <h1>You're Offline</h1>
    <p>No internet connection. Your cached bookings are still available.</p>
    <a href="/bookings">View Cached Bookings</a>
    <p class="note">We'll reconnect automatically when your internet returns.</p>
  </div>
</body>
</html>
